<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry Baking - Recipes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../images/favicon-pie.png">
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <!-- header (navbar from components) -->
    <header id="navbar" class="sticky-top"></header>
    <!-- mini filters -->
    <!-- TODO filters are decorative for now, functionality tba later -->
    <section class="filters-section py-5">
        <div class="container">
            <div class="input-group mb-5">
                <input type="text" class="form-control all-recipes-form" placeholder="Enter ingredients (e.g. flour, eggs, butter)..." aria-label="Enter ingredients (e.g. flour, eggs, butter)..." aria-describedby="button-addon2">
                <button class="btn btn-outline-secondary all-recipes-btn" type="button" id="button-addon2">Search</button>
            </div>
      
            <h4>Cooking Time</h4>
        
            <div class="d-flex flex-wrap gap-3 mb-4 mt-2">
                <button class="btn filter-chip">< 30 min</button>
                <button class="btn filter-chip">30–60 min</button>
                <button class="btn filter-chip">1–2 hours</button>
                <button class="btn filter-chip">2+ hours</button>
            </div>
        
            <h4>Difficulty</h4>
        
            <div class="d-flex flex-wrap gap-3 mt-2">
                <button class="btn filter-chip">Easy</button>
                <button class="btn filter-chip">Medium</button>
                <button class="btn filter-chip">Advanced</button>
            </div>
            <hr>
        </div>
    </section>
    <!-- recipe cards (fetched with js) -->
    <section class="recipes-section py-3 pb-5 all-recipes">
        <div class="container">
          <div class="row g-4" id="recipe-container">
            <!-- get cards with js -->
          </div>
        </div>
    </section>
    <!-- footer (from components) -->
    <footer id="footer"></footer>


    <script type="module" src="../scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
