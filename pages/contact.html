<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry Baking - Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="../images/favicon-pie.png">
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

  <!-- navbar -->
    <header id="navbar" class="sticky-top"></header>

    <section class="contact-page d-flex justify-content-center align-items-center pt-5">
        <div class="contact-card px-4 d-flex align-items-center flex-column">  
            <h1>Contact Us :D</h1>
            <p class="contact-card-sub">
                Have recipe suggestions, feedback, or just want to say hi?
            </p>     
            <div class="contact-info pt-4 d-flex justify-content-center align-items-center gap-4 flex-wrap">
                <div class="contact-item">
                    <i class="bi bi-envelope-heart-fill"></i>
                    <div>
                        <p class="contact-label">Email</p>
                        <p class="contact-text">
                            bakewithwhatuhave@gmail.com
                        </p>
                    </div>
                </div>
            
                <a href="https://github.com/butabuta26" target="_blank" class="contact-item text-decoration-none">
                    <i class="bi bi-github"></i>
                    <div>
                        <p class="contact-label">GitHub</p>
                        <p class="contact-text">
                            butabuta26
                        </p>
                    </div>
                </a>
            </div>
            <div class="spinning-cookie">
                <i class="bi bi-cookie"></i>
            </div>
        </div>
      </section>

    <!-- footer -->
    <footer id="footer"></footer>

    <script type="module" src="../scripts/recipe.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
